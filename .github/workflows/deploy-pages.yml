# 推送到 main 后自动部署到 GitHub Pages（无需 Vercel）
# 仓库 Settings → Pages → Source 选 GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        env:
          GITHUB_PAGES: true
          # 若仓库名不是 exercise-tracker，在仓库 Settings → Secrets 添加 PAGES_BASE=/你的仓库名/
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          npm ci
          export GITHUB_PAGES_BASE="/${GITHUB_REPOSITORY_NAME}/"
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
